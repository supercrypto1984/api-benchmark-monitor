name: API Performance Monitor

on:
  schedule:
    - cron: '0 * * * *' # 每小时运行一次
  workflow_dispatch: # 支持手动运行

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install httpx

      - name: Run benchmark
        env:
          UPSTREAM_KEY: ${{ secrets.UPSTREAM_KEY }}
          PROXY_KEY: ${{ secrets.PROXY_KEY }}
          UPSTREAM_URL: "https://model.zhengshuyun.net/v1/responses"
          PROXY_URL: "http://141.148.136.194:8059/v1/responses"
          MODEL_NAME: "gpt-5.4"
        run: python scripts/api_benchmark.py

      - name: Commit and Push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add api_stats.json
          git commit -m "chore: update api stats [skip ci]" || exit 0
          git push
